# MongoDB config
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ecommerce_db}

# Resend API key for email dispatch on Render (HTTPS, not blocked)
# Set the RESEND_API_KEY environment variable on Render dashboard
resend.api.key=${RESEND_API_KEY:}

# Sender email address (use onboarding@resend.dev for free tier, or your verified domain)
email.from=${EMAIL_FROM:onboarding@resend.dev}

# SMTP config (fallback for local development when BREVO_API_KEY is not set)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=electronce20@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server port
server.port=${PORT:8080}
